<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Project Lab | Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00fbff;
            --secondary: #7000ff;
            --dark: #050a18;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; transition: 0.3s; }
        body { background: var(--dark); color: white; font-family: 'Space Grotesk', sans-serif; margin: 0; }

        /* Navigation Bar */
        nav {
            background: rgba(5, 10, 24, 0.9);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid var(--glass);
        }

        .logo { font-size: 1.5rem; font-weight: 700; cursor: pointer; }
        .logo span { color: var(--primary); }

        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-links a { color: #94a3b8; text-decoration: none; font-size: 14px; }
        .nav-links a:hover { color: var(--primary); }

        .login-btn {
            background: var(--primary);
            color: var(--dark);
            padding: 8px 20px;
            border-radius: 5px;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        /* Sidebar (3 Dots Menu) */
        .menu-dots { font-size: 1.5rem; cursor: pointer; color: var(--primary); }
        .sidebar {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
            background: #0a1428; z-index: 2000; padding: 40px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .sidebar.active { right: 0; }
        .close-menu { position: absolute; top: 20px; left: 20px; cursor: pointer; }

        /* Login Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: #111b31; padding: 40px; border-radius: 15px; width: 350px;
            border: 1px solid var(--primary); text-align: center;
        }
        .modal-content input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: var(--glass); border: 1px solid #333; color: white; border-radius: 5px;
        }

        /* Hero Section */
        .hero { text-align: center; padding: 100px 20px; background: radial-gradient(circle at center, #112240, var(--dark)); }
        
        /* Branch Buttons */
        .branch-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px; max-width: 1100px; margin: -50px auto 50px; padding: 0 20px;
        }
        .b-card {
            background: var(--glass); padding: 30px; border-radius: 10px; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }
        .b-card:hover { border-color: var(--primary); transform: translateY(-5px); background: rgba(0,251,255,0.05); }

        /* Project Section */
        #projectArea { max-width: 1200px; margin: 50px auto; display: none; padding: 20px; }
        .p-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .p-card { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 10px; border-left: 4px solid var(--primary); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Student<span>Lab</span></div>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">Projects</a>
            <a href="#">About</a>
            <button class="login-btn" onclick="toggleModal()">Login</button>
            <div class="menu-dots" onclick="toggleSidebar()"><i class="fas fa-ellipsis-v"></i></div>
        </div>
    </nav>

    <div class="sidebar" id="sidebar">
        <i class="fas fa-times close-menu" onclick="toggleSidebar()"></i>
        <h3 style="margin-top:40px;">Menu</h3>
        <p><i class="fas fa-user"></i> My Profile</p>
        <p><i class="fas fa-folder"></i> Saved Projects</p>
        <p><i class="fas fa-cog"></i> Settings</p>
        <p><i class="fas fa-sign-out-alt"></i> Logout</p>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <i class="fas fa-times" style="float:right; cursor:pointer" onclick="toggleModal()"></i>
            <h2>User Login</h2>
            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">
            <button class="login-btn" style="width:100%; margin-top:15px;">Sign In</button>
            <p style="font-size:12px; color:#666; margin-top:15px;">Don't have an account? <span style="color:var(--primary)">Register</span></p>
        </div>
    </div>

    <section class="hero">
        <h1>Engineering Innovation Gallery</h1>
        <p style="color:#94a3b8">Search, Learn, and Download Projects</p>
        <div style="margin-top:30px;">
            <input type="text" placeholder="Search projects..." style="padding:12px 30px; width:300px; border-radius:50px; border:none; background:var(--glass); color:white;">
        </div>
    </section>

    <div class="branch-grid">
        <div class="b-card" onclick="showBranch('Electronics')"><i class="fas fa-microchip"></i><br>Electronics</div>
        <div class="b-card" onclick="showBranch('Computer')"><i class="fas fa-code"></i><br>Computer</div>
        <div class="b-card" onclick="showBranch('Mechanical')"><i class="fas fa-cog"></i><br>Mechanical</div>
        <div class="b-card" onclick="showBranch('Civil')"><i class="fas fa-building"></i><br>Civil</div>
        <div class="b-card" onclick="showBranch('AI')"><i class="fas fa-robot"></i><br>AI</div>
    </div>

    <div id="projectArea">
        <h2 id="bName"></h2>
        <div class="p-grid" id="pGrid"></div>
    </div>

    <script>
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function toggleModal() { 
            let m = document.getElementById('loginModal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function showBranch(name) {
            document.getElementById('projectArea').style.display = 'block';
            document.getElementById('bName').innerText = name + " Projects";
            let grid = document.getElementById('pGrid');
            grid.innerHTML = `<div class="p-card"><h3>${name} Project 1</h3><p>Sample description for ${name} engineering projects.</p></div>`;
            window.scrollTo({top: 600, behavior: 'smooth'});
        }
    </script>
</body>
</html>
