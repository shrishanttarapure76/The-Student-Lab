<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Project Lab</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #00fbff;
            --dark: #050a18;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--dark);
            color: #e2e8f0;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            text-align: center;
        }

        header {
            padding: 60px 20px;
            background: linear-gradient(to bottom, #0a1428, var(--dark));
        }

        .logo-text { font-size: 3rem; margin: 0; font-weight: 700; color: white; }
        .logo-text span { color: var(--primary); }

        /* Branch Selection Area */
        .branch-section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .branch-btn {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 25px 10px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 14px;
        }

        .branch-btn:hover, .branch-btn.active {
            background: var(--primary);
            color: var(--dark);
            box-shadow: 0 0 20px rgba(0,251,255,0.3);
            transform: translateY(-5px);
        }

        /* Project Display Area (Hidden by default) */
        .project-display {
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
            display: none; /* Hide until clicked */
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .project-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 15px;
            text-align: left;
        }

        .project-card h3 { color: var(--primary); margin-top: 0; }
        
        .view-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 15px;
            background: var(--primary);
            color: var(--dark);
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 13px;
        }

        h2#selectedBranchName {
            color: white;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">Student<span>Lab</span></h1>
        <p>Select your branch to view projects</p>
    </header>

    <div class="branch-section">
        <button class="branch-btn" onclick="showProjects('Electronics', 'entc')">Electronics</button>
        <button class="branch-btn" onclick="showProjects('Electrical', 'electrical')">Electrical</button>
        <button class="branch-btn" onclick="showProjects('Mechanical', 'mech')">Mechanical</button>
        <button class="branch-btn" onclick="showProjects('Civil', 'civil')">Civil</button>
        <button class="branch-btn" onclick="showProjects('Computer', 'comp')">Computer</button>
        <button class="branch-btn" onclick="showProjects('A.I.', 'ai')">Artificial Intelligence</button>
    </div>

    <div id="projectArea" class="project-display">
        <h2 id="selectedBranchName"></h2>
        <div class="project-grid" id="projectGrid">
            </div>
    </div>

    <script>
        // Data for each branch
        const projectsData = {
            entc: [
                { title: "Smart Voting Machine", desc: "Arduino based secure digital voting system." },
                { title: "Home Automation", desc: "Control home lights via Bluetooth/Mobile app." }
            ],
            electrical: [
                { title: "Wireless Power Transfer", desc: "Tesla Coil based power transmission without wires." },
                { title: "Smart Energy Meter", desc: "Monitor electricity usage and send SMS alerts." }
            ],
            mech: [
                { title: "Hydraulic Robot Arm", desc: "Machine for lifting heavy objects using hydraulics." },
                { title: "Solar Grass Cutter", desc: "Fully automated lawn mower powered by solar." }
            ],
            civil: [
                { title: "Earthquake Resistant Building", desc: "Model showing base isolation for seismic safety." },
                { title: "Smart City Management", desc: "Urban planning with advanced waste management." }
            ],
            comp: [
                { title: "Library Management", desc: "Software to manage book records using Python/MySQL." },
                { title: "Password Manager", desc: "Secure tool for storing encrypted passwords." }
            ],
            ai: [
                { title: "Face Recognition", desc: "Attendance system using AI and computer vision." },
                { title: "Voice Assistant", desc: "Personal assistant like Alexa/Siri using Python." }
            ]
        };

        function showProjects(branchName, branchKey) {
            // 1. Show the display area
            const area = document.getElementById('projectArea');
            area.style.display = 'block';

            // 2. Set Branch Title
            document.getElementById('selectedBranchName').innerText = branchName + " Projects";

            // 3. Generate Project Cards
            const grid = document.getElementById('projectGrid');
            grid.innerHTML = ""; // Clear old projects

            projectsData[branchKey].forEach(p => {
                const card = `
                    <div class="project-card">
                        <h3>${p.title}</h3>
                        <p>${p.desc}</p>
                        <a href="#" class="view-btn">View Full Report</a>
                    </div>
                `;
                grid.innerHTML += card;
            });

            // 4. Highlight active button
            const btns = document.querySelectorAll('.branch-btn');
            btns.forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            // Scroll to projects
            area.scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
